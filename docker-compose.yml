services:
  simplephotos:
    image: lzyyauto/simplephotos:latest
    ports:
      - "8000:8000"
    volumes:
      - /Users/zingliu/Code/SimplePhotos/data:/app/data
      - /Volumes/Pic:/app/data/images
    environment:
      - NODE_ENV=production
      - LANG=zh_CN.UTF-8
      - LC_ALL=zh_CN.UTF-8
      - DATA_ROOT=/app/data
      - IMAGES_DIR=/app/data/images
      - SCAN_WORKERS=4                # 扫描线程数，建议设置为 CPU 核心数的 2-4 倍
      - SCAN_CHUNK_SIZE=20            # 每个分片的文件数
      # 数据库配置：使用 postgresql（或注释掉改用默认 sqlite）
      - DB_TYPE=postgresql
      - PG_HOST=localhost
      - PG_PORT=5432
      - PG_USER=postgres
      - PG_PASSWORD=
      - PG_DATABASE=simplephotos
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

volumes:
  data:
    driver: local